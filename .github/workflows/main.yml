name: Build & Push Docker Image
on:
  push:
    branches: [ "main" ]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nguyenthong202/duanjava:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nguyenthong202/duanjava:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/duanjava:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/duanjava:${{ github.sha }}
