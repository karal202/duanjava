name: Build & Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/duanjava:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/duanjava:${{ github.sha }} \
            .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/duanjava:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/duanjava:${{ github.sha }}

      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="repository/docker"
          CONTAINER_PORT=80

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=5&container_port=$CONTAINER_PORT")

          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)

          echo "Webhook HTTP: $CODE"

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi

          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
